services:
  - type: web
    name: bedr-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: FRONTEND_URL
        value: https://bedr-frontend.vercel.app
      - key: PORT
        value: 5000

databases:
  - name: postgres
    databaseName: bedrdb
    user: postgres
    plan: free
